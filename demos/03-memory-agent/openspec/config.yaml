schema: spec-driven

# Project context
# 项目上下文，向 AI 提供技术栈、约定、风格指南、领域知识等
context: |
  ## Tech Stack 技术栈

  ### 后端 (Backend)
  - Python 3.10+
  - FastAPI - Web 框架
  - asyncpg - 异步 PostgreSQL 驱动
  - Pydantic V2 - 数据验证
  - python-jose - JWT 认证
  - bcrypt - 密码加密
  - sse-starlette - SSE 流式输出
  - pytest - 单元测试

  ### 前端 (Frontend)
  - Vue 3 - 前端框架
  - TypeScript - 类型安全
  - Vite - 构建工具
  - Element Plus - UI 组件库
  - Pinia - 状态管理
  - Vue Router - 路由管理
  - Vitest - 单元测试
  - Playwright - E2E 测试

  ### 数据库
  - Supabase PostgreSQL - 云数据库

  ## Conventions 开发约定

  ### Git 提交规范 (Conventional Commits)
  - feat: 新功能
  - fix: 修复 bug
  - refactor: 重构代码
  - docs: 文档更新
  - test: 测试相关
  - chore: 构建/工具链相关

  ### TDD 开发模式
  - 遵循 RED → GREEN → REFACTOR 工作流
  - 后端测试最低覆盖率：80%
  - 先写测试，再实现功能

  ### 代码风格
  - Python: 遵循 PEP 8
  - TypeScript/Vue: 遵循 Vue 3 风格指南
  - 不可变性原则：创建新对象，不修改原对象
  - 高内聚低耦合：按功能组织代码

  ## Domain 领域知识

  本项目是一个 AI Agent 演示应用，展示以下核心功能：

  1. **Agent 核心循环** - ReAct 模式：调用 LLM → 执行工具 → 再次调用 LLM → ...
  2. **SSE 流式输出** - 使用 Server-Sent Events 实现实时流式响应
  3. **工具调用** - 计算器、天气查询等可扩展工具系统
  4. **用户认证** - 基于 JWT 的用户注册和登录
  5. **会话管理** - 多轮对话历史持久化

  ## Architecture 架构设计

  ### 后端设计模式
  - **Provider 抽象**: LLMClient 基类定义接口，便于扩展其他 LLM 提供商
  - **Repository 模式**: 数据库操作封装在 repositories 中
  - **依赖注入**: FastAPI 依赖注入系统（get_current_user, get_db）

  ### 前端架构
  - **组件化**: Vue 单文件组件
  - **状态管理**: Pinia stores (auth, chat)
  - **SSE 处理**: fetch() + ReadableStream 解析事件流

# Per-artifact rules
# 每个构件的规则
rules:
  proposal:
    - 保持提案简洁，聚焦于 "做什么" 和 "为什么做"
    - 必须包含 "Non-goals"（非目标）部分，明确排除的内容
    - 描述当前问题和解决方案

  design:
    - 描述 "怎么做" - 技术实现方案
    - 包含架构图或流程图（ASCII 图）
    - 列出涉及的文件和模块
    - 考虑边界情况和错误处理

  tasks:
    - 将任务分解为 2 小时内可完成的小块
    - 每个任务应该是可验证的
    - 按依赖关系排序任务
    - 标注任务类型（feat/fix/refactor/test/docs）
